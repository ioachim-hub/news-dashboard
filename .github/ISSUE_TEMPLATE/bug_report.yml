name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What's broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Self-hosted (Docker/Helm)
        - Local development
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Find this at `/api/version` or in the Settings page.
      placeholder: "e.g. v1.21.0"
    validations:
      required: true
  - type: input
    id: browser_os
    attributes:
      label: Browser and OS (for UI bugs)
      description: Leave blank for backend-only issues.
      placeholder: "e.g. Chrome 125 on macOS 14"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any relevant logs, stack traces, or screenshots. This will be automatically formatted as code, so no need for backticks.
      render: shell
    validations:
      required: false
