apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "news-dashboard.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: news-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: NEWS_DASHBOARD_DB
              value: {{ .Values.app.databasePath | quote }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: data
{{- if .Values.persistence.hostPath }}
          hostPath:
            path: {{ .Values.persistence.hostPath | quote }}
            type: DirectoryOrCreate
{{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "news-dashboard.fullname" . }}
{{- else }}
          emptyDir: {}
{{- end }}
